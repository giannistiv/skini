name: Update Theater Plays

on:
  schedule:
    # Every Monday at 09:00 UTC (noon Athens time)
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      max_plays:
        description: "Maximum new plays to add"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/scrape_plays.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/data.js images/
          git commit -m "Auto-update: add new theater plays $(date +%Y-%m-%d)"
          git push
